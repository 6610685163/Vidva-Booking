<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ระบบจองห้อง คณะวิศวกรรมศาสตร์ มธ.</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --tu-red: #c21e2d;
            /* สีแดงธรรมศาสตร์ */
            --tu-red-hover: #a01825;
            --text-main: #374151;
            --text-muted: #6b7280;
            --bg-color: #f3f4f6;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-main);
        }

        .login-card {
            background: #ffffff;
            padding: 2.5rem 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: var(--tu-red);
            font-size: 1.5rem;
            margin: 0 0 0.5rem 0;
            font-weight: 600;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 0;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Sarabun', sans-serif;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--tu-red);
            box-shadow: 0 0 0 3px rgba(194, 30, 45, 0.15);
        }

        .btn-submit {
            width: 100%;
            background-color: var(--tu-red);
            color: #ffffff;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Sarabun', sans-serif;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background-color: var(--tu-red-hover);
        }

        .alert-error {
            background-color: #fee2e2;
            color: #b91c1c;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1.25rem;
            text-align: center;
            border: 1px solid #f87171;
        }

        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="header">
            <h1>TSE Room Booking</h1>
            <p>ระบบจองห้อง คณะวิศวกรรมศาสตร์ มหาวิทยาลัยธรรมศาสตร์</p>
        </div>

        <form method="POST" action="">
            {% csrf_token %}

            {% if messages %}
            {% for message in messages %}
            <div class="alert-error">{{ message }}</div>
            {% endfor %}
            {% endif %}

            <div class="form-group">
                <label for="username">ชื่อผู้ใช้งาน (Username)</label>
                <input type="text" id="username" name="username" class="form-control"
                    placeholder="รหัสนักศึกษา / บัญชีบุคลากร" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">รหัสผ่าน (Password)</label>
                <input type="password" id="password" name="password" class="form-control"
                    placeholder="รหัสผ่านเดียวกับ TU-WiFi" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-submit">เข้าสู่ระบบผ่าน TU API</button>
        </form>

        <div class="footer-text">
            เข้าสู่ระบบด้วยบัญชีของมหาวิทยาลัยธรรมศาสตร์<br>
            (ใช้ Username และ Password เดียวกับระบบ TU-WiFi)
        </div>
    </div>

</body>

</html>
